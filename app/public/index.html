// ── SLACK @MENTION PING ─────────────────────────────────────
// Fires when a *newly-added* @mention is detected on save of an Assets/Notes
// edit. Each mentioned name is resolved through the Slack map; if found, we
// format as <@U123> so Slack sends a real user notification. Mentions of the
// current user are skipped (no self-pings).
async function sendMentionPing(mentionedName, row, noteText) {
  if (!MENTIONS_WEBHOOK_URL) return false;
  const name = (mentionedName || '').toLowerCase();
  if (!name) return false;
  // Don't ping yourself
  if (currentUserFirstName && name === currentUserFirstName) return false;

  const slackId = _slackUserMap[name];
  const ping = slackId ? `<@${slackId}>` : `@${mentionedName}`;
  const fromName = currentUserFirstName
    ? currentUserFirstName.charAt(0).toUpperCase() + currentUserFirstName.slice(1)
    : 'Someone';

  // Same field shape as the Report Request message so Slack readers see familiar context
  const advertiser = (row.advertiser || '—').trim();
  const ioName     = (row.ioName     || '—').trim();
  const lineItem   = (row.lineItem   || '—').trim();
  const dealId     = (row.dealId     || '—').trim();
  const lineItemId = (row.lineItemId || '—').trim();
  const startDate  = (row._startOverride || row.startDate || '—').trim();
  const endDate    = (row._endOverride   || row.endDate   || '—').trim();
  const type       = (row.type        || '—').trim();
  const sales      = (row.salesperson || '—').trim();
  const status     = statusLabel(getStatusKey(row));
  const gam        = (row._gamLinkOverride !== undefined ? row._gamLinkOverride : row.gamLink || '').trim();
  const gamLink    = gam ? (gam.startsWith('http') ? gam : 'https://' + gam) : '';

  // Truncate long notes so Slack messages stay readable
  const noteDisplay = (noteText || '').length > 280
    ? (noteText.substring(0, 280) + '…')
    : (noteText || '');

  const lines = [
    `💬 ${ping} — ${fromName} mentioned you`,
    noteDisplay ? `> ${noteDisplay}` : null,
    `*Advertiser:* ${advertiser}`,
    `*IO Name:* ${ioName}`,
    `*Line Item:* ${lineItem}`,
    `*Deal ID:* ${dealId}`,
    `*Line Item ID:* ${lineItemId}`,
    `*Dates:* ${startDate} → ${endDate}`,
    `*Type:* ${type}`,
    `*Salesperson:* ${sales}`,
    `*Status:* ${status}`,
    gamLink ? `*GAM:* <${gamLink}|Open in GAM>` : '*GAM:* —',
  ].filter(Boolean);
  const text = lines.join('\n');

  try {
    await fetch(MENTIONS_WEBHOOK_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    console.info('[slack] mention ping sent: @' + mentionedName + (slackId ? ' (ID: ' + slackId + ')' : ' (no ID mapped)') + ' on ' + advertiser + ' / ' + lineItem);
    return true;
  } catch(e) {
    console.warn('[slack] mention ping failed:', e);
    return false;
  }
}

// Move a row from one sheet to another by appending + clearing source.
// Used when status changes — the row moves between tabs.
async function moveRowBetweenSheets(fromTabId, rowIdx, toTabId, updatedRowValues) {
  if (!accessToken) return;
  if (isSessionExpired()) {
    forceExpiredLogout('Session expired after 10 hours. Please sign in again to save changes.');
    return false;
  }
  const fromSheet = SHEET_MAP[fromTabId];
  const toSheet   = SHEET_MAP[toTabId];
  showSave('saving');
  try {
    // Make sure we have sheet IDs (needed for deletion)
    if (fromSheet.sheetId === undefined || toSheet.sheetId === undefined) {
      await fetchSheetMetadata();
    }

    // 1. Append to new sheet
    const appendResp = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(toSheet.name + '!A:M')}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,
      {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ majorDimension: 'ROWS', values: [updatedRowValues] })
      }
    );
    if (!appendResp.ok) {
      if (appendResp.status === 401 || appendResp.status === 403) {
        forceExpiredLogout('Your Google sign-in expired. Please sign in again to save changes.');
        return false;
      }
      throw new Error('Append failed: ' + await appendResp.text());
    }

    // 2. Actually DELETE the source row (rather than clear) so no blank line is left
    // rowIdx is 0-based within the data (header is row 0 in sheet, data starts at row 1)
    // deleteDimension uses 0-based, [startIndex, endIndex) — row 0 is the header, so our row is rowIdx+1
    const deleteResp = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}:batchUpdate`,
      {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          requests: [{
            deleteDimension: {
              range: {
                sheetId: fromSheet.sheetId,
                dimension: 'ROWS',
                startIndex: rowIdx + 1,  // +1 skips the header row
                endIndex:   rowIdx + 2,  // exclusive — deletes exactly one row
              }
            }
          }]
        })
      }
    );
    if (!deleteResp.ok) throw new Error('Delete failed: ' + await deleteResp.text());

    showSave('saved');
    return true;
  } catch(e) {
    showSave('error');
    console.error('Move error:', e);
    return false;
  }
}

function showSave(state) {
  const el = document.getElementById('saveIndicator');
  el.className = `save-indicator ${state}`;
  el.textContent = state === 'saving' ? 'Saving…' : state === 'saved' ? '✓ Saved' : '✗ Error';
  if (state !== 'saving') setTimeout(() => { el.className = 'save-indicator'; }, 2200);
}

// ════════════════════════════════════════════════════════════
//  PARSE
// ════════════════════════════════════════════════════════════
function parseRow(cols, idx, tabId) {
  return {
    _idx: idx,
    _tab: tabId,
    status:      cols[COL.status]      || '',
    assets:      cols[COL.assets]      || '',
    startDate:   cols[COL.startDate]   || '',
    dealId:      cols[COL.dealId]      || '',
    advertiser:  cols[COL.advertiser]  || '',
    ioName:      cols[COL.ioName]      || '',
    lineItem:    cols[COL.lineItem]    || '',
    lineItemId:  cols[COL.lineItemId]  || '',
    endDate:     cols[COL.endDate]     || '',
    type:        cols[COL.type]        || '',
    salesperson: cols[COL.salesperson] || '',
    screenshots: (cols[COL.screenshots] || '').toString(),
    gamLink:     cols[COL.gamLink]     || '',
    // local overrides
    _startOverride:   '',
    _endOverride:     '',
    _assetsOverride:  undefined,
    _ssOverride:      undefined,
    _gamLinkOverride: undefined,
  };
}

function rowToSheetValues(r) {
  const arr = [];
  arr[COL.status]      = r.status;
  arr[COL.assets]      = r._assetsOverride !== undefined ? r._assetsOverride : r.assets;
  arr[COL.startDate]   = r._startOverride || r.startDate;
  arr[COL.dealId]      = r.dealId;
  arr[COL.advertiser]  = r.advertiser;
  arr[COL.ioName]      = r.ioName;
  arr[COL.lineItem]    = r.lineItem;
  arr[COL.lineItemId]  = r.lineItemId;
  arr[COL.endDate]     = r._endOverride || r.endDate;
  arr[COL.type]        = r.type;
  arr[COL.salesperson] = r.salesperson;
  arr[COL.screenshots] = isScreenshotChecked(r) ? 'Yes' : '';
  arr[COL.gamLink]     = r._gamLinkOverride !== undefined ? r._gamLinkOverride : r.gamLink;
  return arr;
}

// ════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════
function isScreenshotChecked(r) {
  if (r._ssOverride !== undefined) return r._ssOverride;
  const v = (r.screenshots || '').toLowerCase().trim();
  return v === 'yes' || v === 'true' || v === 'y' || v === '✓' || v === 'x' || v === '1';
}

function fmtDate(d) {
  if (!d || !d.trim() || d === '—') return '—';
  const cleaned = d.replace(/ AL$/, '').trim();
  let dt;
  const isoM = cleaned.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  const slashM = cleaned.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (isoM) dt = new Date(parseInt(isoM[1]), parseInt(isoM[2])-1, parseInt(isoM[3]));
  else if (slashM) {
    const yr = slashM[3].length === 2 ? 2000 + parseInt(slashM[3]) : parseInt(slashM[3]);
    dt = new Date(yr, parseInt(slashM[1])-1, parseInt(slashM[2]));
  } else dt = new Date(cleaned);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'2-digit' });
}

function toISODate(s) {
  if (!s) return '';
  const cleaned = s.replace(/ AL$/, '').trim();
  let y, m, d;
  const isoM = cleaned.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  const slashM = cleaned.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (isoM) [y,m,d] = [parseInt(isoM[1]), parseInt(isoM[2]), parseInt(isoM[3])];
  else if (slashM) {
    const yr = slashM[3].length === 2 ? 2000 + parseInt(slashM[3]) : parseInt(slashM[3]);
    [y,m,d] = [yr, parseInt(slashM[1]), parseInt(slashM[2])];
  } else {
    const dt = new Date(cleaned);
    if (isNaN(dt)) return '';
    [y,m,d] = [dt.getFullYear(), dt.getMonth()+1, dt.getDate()];
  }
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function getStatusKey(r) {
  // Status field drives the pill; falls back to tab
  const s = (r.status || '').toLowerCase().trim();
  // 'new' must be checked before 'upcoming' since both live on the Upcoming tab
  if (s === 'new' || s.includes('new'))  return 'new';
  if (s.includes('upcoming'))   return 'upcoming';
  if (s.includes('ready'))      return 'ready';
  if (s.includes('delivering')) return 'delivering';
  if (s.includes('paused'))     return 'paused';
  if (s.includes('cancel'))     return 'cancelled'; // matches cancel, cancelled, canceled
  if (s.includes('completed') || s.includes('complete') || s.includes('done')) return 'completed';
  // No status at all? On Upcoming tab, default to 'new'. Elsewhere, match the tab.
  if (!s && r._tab === 'upcoming') return 'new';
  return r._tab || 'upcoming';
}

function statusLabel(key) {
  return { new:'New', upcoming:'Upcoming', ready:'Ready', delivering:'Delivering', paused:'Paused', completed:'Completed', cancelled:'Cancelled' }[key] || key;
}

// Status keys that live on the Upcoming tab — changing between them does NOT move the row
const UPCOMING_STATUSES = new Set(['new', 'upcoming']);
function statusTabFor(key) {
  if (UPCOMING_STATUSES.has(key)) return 'upcoming';
  return key; // ready → ready tab, etc.
}

// For the Upcoming tab: classify how soon the start date is.
// Returns 'overdue' (start date already passed), 'soon' (within next 7 days), or null.
function getUrgency(row) {
  const raw = row._startOverride || row.startDate;
  const iso = toISODate(raw);
  if (!iso) return null;
  const [y, m, d] = iso.split('-').map(Number);
  const start = new Date(y, m - 1, d);
  const now = new Date(); now.setHours(0, 0, 0, 0);
  const diffDays = Math.round((start - now) / (1000 * 60 * 60 * 24));
  if (diffDays < 0)  return 'overdue';
  if (diffDays <= 7) return 'soon';
  return null;
}

// ════════════════════════════════════════════════════════════
//  SORT / FILTER
// ════════════════════════════════════════════════════════════
function sortRows(rows) {
  const onUpcoming = activeTab === 'upcoming';
  // Mentions float works on every campaign tab; Upcoming-specific floats only on Upcoming
  const anyFloat = floatMentions || (onUpcoming && (floatNew || floatOverdue || floatSoon));

  return [...rows].sort((a, b) => {
    // Float-to-top layer
    if (anyFloat) {
      const skA = getStatusKey(a);
      const skB = getStatusKey(b);
      const ua = getUrgency(a);
      const ub = getUrgency(b);
      const mA = rowMentionsMe(a);
      const mB = rowMentionsMe(b);

      const rank = (sk, u, mentionsMe) => {
        // @me mentions take top priority — most personal/urgent
        if (floatMentions && mentionsMe)       return 0;
        if (floatNew     && sk === 'new')      return 1;
        if (floatOverdue && u  === 'overdue')  return 2;
        if (floatSoon    && u  === 'soon')     return 3;
        return 4;
      };
      const ra = rank(skA, ua, mA);
      const rb = rank(skB, ub, mB);
      if (ra !== rb) return ra - rb;
    }

    // Regular column sort
    let va = a[sortCol] || '';
    let vb = b[sortCol] || '';
    if (['startDate','endDate'].includes(sortCol)) {
      va = va ? new Date(toISODate(va)) : new Date(0);
      vb = vb ? new Date(toISODate(vb)) : new Date(0);
      if (isNaN(va)) va = new Date(0);
      if (isNaN(vb)) vb = new Date(0);
    } else {
      va = String(va).toLowerCase();
      vb = String(vb).toLowerCase();
    }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ?  1 : -1;
    return 0;
  });
}

function filterRows(rows) {
  return rows.filter(r => {
    if (searchQ) {
      const q = searchQ.toLowerCase();
      const haystack = [r.advertiser, r.ioName, r.lineItem, r.dealId, r.lineItemId, r.assets, r.type, r.salesperson].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    if (advFilter   && r.advertiser  !== advFilter)   return false;
    if (salesFilter && r.salesperson !== salesFilter) return false;
    if (typeFilter  && r.type        !== typeFilter)  return false;
    return true;
  });
}

// ════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════
function renderTable(rows, tabId) {
  const filtered = filterRows(sortRows(rows));
  const cols = columnsForTab(tabId);

  const thHTML = cols.map(c => {
    if (c.sortable === false) {
      // Non-sortable column (e.g. action buttons) — no click handler, no arrow
      return `<th class="no-sort">${c.label}</th>`;
    }
    const active = sortCol === c.key ? 'sorted' : '';
    const arrow = sortCol === c.key ? (sortAsc ? '↑' : '↓') : '↕';
    return `<th class="${active}" data-col="${c.key}">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
  }).join('');

  const rowsHTML = filtered.length === 0
    ? `<tr><td colspan="${cols.length}"><div class="empty-state"><div class="icon">∅</div><p>No items match</p><small>Try adjusting filters or search</small></div></td></tr>`
    : filtered.map(r => {
        const sk = getStatusKey(r);
        const ssChecked = isScreenshotChecked(r);
        const assetsVal = r._assetsOverride !== undefined ? r._assetsOverride : r.assets;
        const startDisp = r._startOverride || r.startDate;
        const endDisp   = r._endOverride   || r.endDate;

        const rowClass = sk === 'new' ? 'row-new' : sk === 'paused' ? 'row-paused' : sk === 'completed' ? 'row-completed' : sk === 'cancelled' ? 'row-cancelled' : '';

        // Urgency pill — only on Upcoming tab
        const urgency = tabId === 'upcoming' ? getUrgency(r) : null;
        const urgencyClass = urgency ? ` row-${urgency}` : '';
        const urgencyPill = urgency
          ? `<span class="urgency-pill urgency-${urgency}">${urgency === 'overdue' ? 'Overdue' : 'Soon'}</span>`
          : '';

        const flashClass = _changedRowKeys.has(rowChangeKey(r)) ? ' activity-flash' : '';
        const mentionsMeClass = rowMentionsMe(r) ? ' row-mentions-me' : '';

        return `<tr class="${rowClass}${urgencyClass}${flashClass}${mentionsMeClass}">
          <td>
            <span class="status-pill pill-${sk} edit-trigger" data-idx="${r._idx}" data-tab="${tabId}" title="Click to change status">
              ${statusLabel(sk)}<span class="edit-hint">✎</span>
            </span>${urgencyPill}
          </td>
          <td class="editable-notes" data-idx="${r._idx}" data-tab="${tabId}" title="Click to edit">
            <div class="notes-display">${assetsVal ? renderWithMentions(assetsVal.substring(0, 140)) : '<span class="notes-placeholder">Add note…</span>'}</div>
            <textarea class="notes-editor" rows="3" placeholder="Enter assets or notes…">${escHTML(assetsVal)}</textarea>
          </td>
          <td class="date-cell editable-date" data-idx="${r._idx}" data-tab="${tabId}" data-field="startDate">
            <span class="date-display${startDisp ? '' : ' empty'}">
              ${fmtDate(startDisp)}<span class="edit-icon">✎</span>
            </span>
            <div class="date-picker">
              <div class="date-picker-label">
                Start Date
                <span class="date-clear">Clear</span>
              </div>
              <div class="date-fields">
                <input type="number" class="d-mm" placeholder="MM" min="1" max="12" value="${toISODate(startDisp).split('-')[1] || ''}">
                <span class="d-sep">/</span>
                <input type="number" class="d-dd" placeholder="DD" min="1" max="31" value="${toISODate(startDisp).split('-')[2] || ''}">
                <span class="d-sep">/</span>
                <input type="number" class="d-yyyy" placeholder="YYYY" min="2000" max="2099" value="${toISODate(startDisp).split('-')[0] || ''}">
              </div>
              <button class="date-apply">Apply</button>
            </div>
          </td>
          <td class="date-cell editable-date" data-idx="${r._idx}" data-tab="${tabId}" data-field="endDate">
            <span class="date-display${endDisp ? '' : ' empty'}">
              ${fmtDate(endDisp)}<span class="edit-icon">✎</span>
            </span>
            <div class="date-picker">
              <div class="date-picker-label">
                End Date
                <span class="date-clear">Clear</span>
              </div>
              <div class="date-fields">
                <input type="number" class="d-mm" placeholder="MM" min="1" max="12" value="${toISODate(endDisp).split('-')[1] || ''}">
                <span class="d-sep">/</span>
                <input type="number" class="d-dd" placeholder="DD" min="1" max="31" value="${toISODate(endDisp).split('-')[2] || ''}">
                <span class="d-sep">/</span>
                <input type="number" class="d-yyyy" placeholder="YYYY" min="2000" max="2099" value="${toISODate(endDisp).split('-')[0] || ''}">
              </div>
              <button class="date-apply">Apply</button>
            </div>
          </td>
          <td class="advertiser-cell" title="${escHTML(r.advertiser)}">${escHTML(r.advertiser) || '—'}</td>
          <td class="name-cell" title="${escHTML(r.ioName)}">${escHTML(r.ioName) || '—'}</td>
          <td class="name-cell" title="${escHTML(r.lineItem)}">${escHTML(r.lineItem) || '—'}</td>
          <td>${r.type ? `<span class="type-chip">${escHTML(r.type)}</span>` : '<span style="color:var(--fog)">—</span>'}</td>
          <td class="person-cell">${escHTML(r.salesperson) || '—'}</td>
          <td class="id-cell">${escHTML(r.dealId) || '—'}</td>
          <td class="screenshot-cell" data-idx="${r._idx}" data-tab="${tabId}">
            <span class="ss-check ${ssChecked ? 'checked' : ''}" title="${ssChecked ? 'Screenshots captured' : 'No screenshots yet'}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </span>
          </td>
          ${renderGamLinkCell(r, tabId)}
          ${(tabId === 'delivering' || tabId === 'completed') ? renderReportButtonCell(r, tabId) : ''}
        </tr>`;
      }).join('');

  const tabMeta = TABS.find(t => t.id === tabId);
  const countText = filtered.length === rows.length
    ? `${rows.length} ${rows.length === 1 ? 'item' : 'items'}`
    : `${filtered.length} of ${rows.length}`;

  return `
    <div class="section-head">
      <div class="section-title-group">
        <h2 class="section-title">${tabMeta.label} <em>campaigns</em></h2>
        <span class="section-meta">${countText}</span>
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead><tr>${thHTML}</tr></thead>
          <tbody>${rowsHTML}</tbody>
        </table>
      </div>
    </div>`;
}

function escHTML(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// V2.1: Escape text AND wrap @mentions in highlight spans.
// If a mention matches the current user's first name, it gets the stronger `.me` style.
function renderWithMentions(text) {
  if (!text) return '';
  const safe = escHTML(text);
  // Match @word at word boundaries; preserve the char before the @ so we don't
  // accidentally match email addresses like support@example.com
  return safe.replace(/(^|[\s(,.!?;:])(@)([a-zA-Z][a-zA-Z0-9_]*)/g, (whole, pre, at, name) => {
    const isMe = currentUserFirstName && name.toLowerCase() === currentUserFirstName;
    return `${pre}<span class="at-mention${isMe ? ' me' : ''}">@${name}</span>`;
  });
}

function sortLogRows(rows) {

    let va = a[col] || '';

      va = String(va).toLowerCase();

    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ?  1 : -1;

  });
}

          <tbody>${rowsHTML}</tbody>
        </table>
      </div>
    </div>`;
}

function renderGamLinkCell(r, tabId) {
  const raw = r._gamLinkOverride !== undefined ? r._gamLinkOverride : r.gamLink;
  const trimmed = (raw || '').trim();
  const href = trimmed
    ? (trimmed.startsWith('http') ? trimmed : 'https://' + trimmed)
    : '';
  return `
    <td class="gam-link-cell" data-idx="${r._idx}" data-tab="${tabId}">
      <div class="gam-link-row">
        ${href
          ? `<a class="gam-view-btn" href="${escHTML(href)}" target="_blank" rel="noopener" title="${escHTML(href)}" onclick="event.stopPropagation()">↗ GAM</a>`
          : `<span class="gam-empty">—</span>`}
        <span class="gam-edit-btn gam-trigger" title="Edit GAM link">✎</span>
      </div>
      <div class="gam-editor">
        <label>GAM line-item URL</label>
        <input type="text" class="gam-input" placeholder="https://admanager.google.com/…" value="${escHTML(trimmed)}">
        <div class="gam-editor-actions">
          <button class="gam-save">Save</button>
          <button class="gam-clear">Clear</button>
        </div>
      </div>
    </td>`;
}

// Per-session memory of which line items have had a report requested.
// Cleared on page reload (by spec — user said no persistence).
// Key includes Deal ID + Line Item ID so a line moving between tabs still
// keeps its "Requested" state through the session.
const _reportRequested = new Set();
function reportKey(r) {
  return (r.dealId || '') + '|' + (r.lineItemId || '') + '|' + (r.ioName || '') + '|' + (r.lineItem || '');
}
function isReportRequested(r) {
  return _reportRequested.has(reportKey(r));
}

function renderReportButtonCell(r, tabId) {
  const requested = isReportRequested(r);
  return `
    <td class="report-btn-cell" data-idx="${r._idx}" data-tab="${tabId}">
      <button class="report-btn${requested ? ' requested' : ''}" ${requested ? 'disabled' : ''} title="${requested ? 'Report already requested this session' : 'Send a report request to Slack'}">
        ${requested ? '✓ Requested' : '📊 Request Report'}
      </button>
    </td>`;
}

function renderAll() {
  const rows = DATA[activeTab] || [];
  const tabMeta = TABS.find(t => t.id === activeTab);
  const isLog = !!tabMeta?.isLog;

  document.getElementById('mainContent').innerHTML =
    `<div class="tab-panel">
       <div class="filter-summary" id="filterSummary"></div>
       ${isLog ? renderChangelogTable(rows) : renderTable(rows, activeTab)}
     </div>`;

  // Result count — reuse the same count element; on log tabs, filter differently
  const filtered = isLog ? filterLogRows(rows) : filterRows(rows);
  document.getElementById('resultCount').textContent =
    filtered.length === rows.length ? `${rows.length} results` : `${filtered.length} / ${rows.length}`;

  // Sort handlers
  document.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) sortAsc = !sortAsc;
      else { sortCol = col; sortAsc = true; }
      userSortedThisTab = true;
      renderAll();
    });
  });

  // Notes editors
  document.querySelectorAll('td.editable-notes').forEach(td => {
    const display = td.querySelector('.notes-display');
    const editor  = td.querySelector('.notes-editor');
    const idx     = parseInt(td.dataset.idx);
    const tab     = td.dataset.tab;

    // V2.2: wire @mention autocomplete (idempotent — safe to call repeatedly)
    attachMentionAutocomplete(editor);

    td.addEventListener('click', e => {
      if (td.classList.contains('editing')) return;
      td.classList.add('editing');
      // V2.2: snapshot existing mentions so we can diff and only ping NEW ones on save
      td._mentionsBeforeEdit = extractMentions(DATA[tab][idx]);
      editor.focus();
      editor.setSelectionRange(editor.value.length, editor.value.length);
    });
    editor.addEventListener('blur', () => {
      const val = editor.value.trim();
      const row = DATA[tab][idx];
      row._assetsOverride = val;
      row.assets = val;
      // Use renderWithMentions so new @mentions show styled immediately
      display.innerHTML = val ? renderWithMentions(val.substring(0, 140)) : '<span class="notes-placeholder">Add note…</span>';
      td.classList.remove('editing');
      writeCell(tab, idx, COL.assets, val);
      // V2.1: update the row's mentions-me class live so the row tint turns
      // on/off immediately if @me was added or removed
      const tr = td.closest('tr');
      if (tr) {
        const mentionsMe = rowMentionsMe(row);
        tr.classList.toggle('row-mentions-me', mentionsMe);
      }
      // Recompute the @Me button count + tab badges since mentions may have changed
      syncFloatButtons();
      renderTabs();

      // V2.2: Slack-ping anyone newly @mentioned in this edit.
      // Compare mentions BEFORE vs AFTER the edit so repeated saves don't
      // re-spam the same person.
      const before = td._mentionsBeforeEdit || new Set();
      const after  = extractMentions(row);
      const newlyMentioned = [...after].filter(name => !before.has(name));
      if (newlyMentioned.length > 0) {
        // Fire pings in parallel; each call handles its own errors + self-skip
        newlyMentioned.forEach(name => sendMentionPing(name, row, val));
      }
      td._mentionsBeforeEdit = null;
    });
    editor.addEventListener('keydown', e => {
      if (e.key === 'Escape') { editor.value = DATA[tab][idx].assets || ''; editor.blur(); }
      e.stopPropagation();
    });
    editor.addEventListener('click', e => e.stopPropagation());
  });

  // Screenshot checkboxes
  document.querySelectorAll('.screenshot-cell').forEach(td => {
    const check = td.querySelector('.ss-check');
    const idx = parseInt(td.dataset.idx);
    const tab = td.dataset.tab;
    check.addEventListener('click', e => {
      e.stopPropagation();
      const r = DATA[tab][idx];
      const newVal = !isScreenshotChecked(r);
      r._ssOverride = newVal;
      r.screenshots = newVal ? 'Yes' : '';
      check.classList.toggle('checked', newVal);
      writeCell(tab, idx, COL.screenshots, newVal ? 'Yes' : '');
      // Notify Slack only when the box is being CHECKED (not unchecked).
      // Fire-and-forget — errors are logged but don't block the UI.
      if (newVal) sendSlackNotification(r);
    });
  });

  // Date pickers (open on click, with smart flip-up)
  document.querySelectorAll('td.editable-date').forEach(td => {
    const picker = td.querySelector('.date-picker');
    const mm = td.querySelector('.d-mm');
    td.addEventListener('click', e => {
      if (e.target.closest('.date-picker')) return;
      e.stopPropagation();
      document.querySelectorAll('.date-picker.open').forEach(p => {
        if (p !== picker) { p.classList.remove('open'); p.classList.remove('flip-up'); }
      });
      const willOpen = !picker.classList.contains('open');
      picker.classList.toggle('open');
      if (willOpen) {
        // Decide flip direction by comparing space above vs below the trigger cell
        picker.classList.remove('flip-up');
        const scroller = td.closest('.table-scroll');
        const tdRect = td.getBoundingClientRect();
        const pRect  = picker.getBoundingClientRect();
        const bottomBound = scroller ? scroller.getBoundingClientRect().bottom : window.innerHeight;
        const topBound    = scroller ? scroller.getBoundingClientRect().top    : 0;
        const spaceBelow = bottomBound - tdRect.bottom;
        const spaceAbove = tdRect.top - topBound;
        if (spaceBelow < pRect.height + 8 && spaceAbove > spaceBelow) {
          picker.classList.add('flip-up');
        }
        setTimeout(() => mm?.focus(), 40);
      } else {
        picker.classList.remove('flip-up');
      }
    });
    picker.addEventListener('click', e => e.stopPropagation());
  });

  // Clear the V2 "changed row" set so the flash only fires once per sync.
  // Give the CSS animation time to start before we wipe the markers.
  if (_changedRowKeys.size) {
    setTimeout(() => _changedRowKeys.clear(), 3100);
  }

  // V2: update filter summary bar
  renderFilterSummary();
}

function renderTabs() {
  const bar = document.getElementById('tabBar');
  const mentionBreakdown = countMyMentionsByTab();
  bar.innerHTML = TABS.map(t => {
    const rows = DATA[t.id] || [];
    const count = rows.length;
    // Upcoming tab shows a "+N new" badge when there are unreviewed items
    let newBadge = '';
    if (t.id === 'upcoming') {
      const newCount = rows.filter(r => getStatusKey(r) === 'new').length;
      if (newCount > 0) {
        newBadge = `<span class="new-count">${newCount} new</span>`;
      }
    }
    // V2.1: @mention badge per tab so you see where mentions live
    let mentionBadge = '';
    const mCount = mentionBreakdown[t.id] || 0;
    if (mCount > 0 && !t.isLog) {
      mentionBadge = `<span class="tab-mention-badge" title="${mCount} ${mCount === 1 ? 'row mentions' : 'rows mention'} you on ${t.label}">@${mCount}</span>`;
    }
    return `<button class="tab-btn ${t.id === activeTab ? 'active' : ''}" data-tab="${t.id}">
      <span class="indicator ${t.dotClass}"></span>
      <span>${t.label}</span>
      <span class="count">${count}</span>
      ${mentionBadge}
      ${newBadge}
    </button>`;
  }).join('');
  bar.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = btn.dataset.tab;
      // Fresh tab = fresh default sort (unless user overrides via column click)
      userSortedThisTab = false;
      applyDefaultSort(activeTab);
      syncFloatButtons();
      syncFilterUI();
      renderTabs();
      renderAll();
    });
  });
}

function syncFloatButtons() {
  const showUpcomingOnly = activeTab === 'upcoming';
  const tabMeta = TABS.find(t => t.id === activeTab);
  const isLog = !!tabMeta?.isLog;
  // @Me mentions button shows on every campaign tab (except the read-only Change Log)
  // and only when we actually know who the user is.
  const showMentions = !isLog && !!currentUserFirstName;

  const btnM = document.getElementById('btnFloatMentions');
  const btnN = document.getElementById('btnFloatNew');
  const btnO = document.getElementById('btnFloatOverdue');
  const btnS = document.getElementById('btnFloatSoon');
  if (!btnN || !btnO || !btnS || !btnM) return;

  btnM.style.display = showMentions ? 'inline-flex' : 'none';
  btnN.style.display = showUpcomingOnly ? 'inline-flex' : 'none';
  btnO.style.display = showUpcomingOnly ? 'inline-flex' : 'none';
  btnS.style.display = showUpcomingOnly ? 'inline-flex' : 'none';

  btnM.dataset.active = floatMentions ? 'true' : 'false';
  btnN.dataset.active = floatNew     ? 'true' : 'false';
  btnO.dataset.active = floatOverdue ? 'true' : 'false';
  btnS.dataset.active = floatSoon    ? 'true' : 'false';

  // Update the pulsing mention-count badge — shows COUNT ON CURRENT TAB,
  // with a tooltip listing mentions on other tabs so you know where to look
  const countEl = document.getElementById('mentionsCount');
  if (countEl) {
    const breakdown = countMyMentionsByTab();
    const hereCount = breakdown[activeTab] || 0;
    const otherTabs = TABS.filter(t => !t.isLog && t.id !== activeTab && (breakdown[t.id] || 0) > 0);

    // Badge shows the count here; "·n" suffix appears if there are more elsewhere
    if (hereCount > 0 || otherTabs.length > 0) {
      let txt = String(hereCount);
      if (otherTabs.length > 0) {
        const elsewhere = otherTabs.reduce((s, t) => s + breakdown[t.id], 0);
        txt = `${hereCount}·+${elsewhere}`;
      }
      countEl.textContent = txt;
      countEl.classList.add('visible');
    } else {
      countEl.textContent = '';
      countEl.classList.remove('visible');
    }

    // Tooltip: Here: N on [tab], Also: X on Y, Z on W
    const parts = [];
    parts.push(`${hereCount} ${hereCount === 1 ? 'mention' : 'mentions'} on ${TABS.find(t => t.id === activeTab)?.label || 'this tab'}`);
    if (otherTabs.length > 0) {
      parts.push('Elsewhere: ' + otherTabs.map(t => `${breakdown[t.id]} on ${t.label}`).join(', '));
    }
    btnM.title = parts.join(' — ') + (breakdown.total ? '\nClick to float mentioning rows to top' : '');
  }
}

function renderStats() {
  const total = Object.values(DATA).reduce((a, rows) => a + rows.length, 0);
  const delivering = (DATA.delivering || []).length;
  const ready      = (DATA.ready || []).length;
  const upcoming   = (DATA.upcoming || []).length;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="num">${delivering}</div><div class="lbl">Delivering</div></div>
    <div class="stat"><div class="num">${ready}</div><div class="lbl">Ready</div></div>
    <div class="stat"><div class="num">${upcoming}</div><div class="lbl">Upcoming</div></div>
    <div class="stat"><div class="num">${total}</div><div class="lbl">Total</div></div>`;
}

function populateFilters() {
  const allRows = Object.values(DATA).flat();
  const advs = [...new Set(allRows.map(r => r.advertiser).filter(Boolean))].sort();
  const sales = [...new Set(allRows.map(r => r.salesperson).filter(Boolean))].sort();
  const types = [...new Set(allRows.map(r => r.type).filter(Boolean))].sort();

  fillSelect('advertiserFilter',  advs,  'All Advertisers',  advFilter);
  fillSelect('salespersonFilter', sales, 'All Salespeople',  salesFilter);
  fillSelect('typeFilter',        types, 'All Types',        typeFilter);
  syncFilterUI();
}

function fillSelect(id, options, allLabel, current) {
  const sel = document.getElementById(id);
  const prev = sel.value || current || '';
  sel.innerHTML = `<option value="">${allLabel}</option>` + options.map(o =>
    `<option value="${escHTML(o)}" ${o === prev ? 'selected' : ''}>${escHTML(o)}</option>`
  ).join('');
  sel.value = prev;
}

// Sync the "active" state on each filter wrap (shows the × button), the
// global "Clear all" link visibility, and which filters apply to the current tab.
function syncFilterUI() {
  const tabMeta = TABS.find(t => t.id === activeTab);
  const isLog = !!tabMeta?.isLog;

  const pairs = [
    ['advertiserFilter',  advFilter],
    ['salespersonFilter', salesFilter],
    ['typeFilter',        typeFilter],
  ];
  pairs.forEach(([id, value]) => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const wrap = sel.closest('.filter-wrap');
    if (wrap) wrap.classList.toggle('active', !!value);
  });

  // Salesperson + Type filters don't apply to the Change Log — hide them there.
  // Advertiser filter is kept because it's shared between campaign data and the log.
  const salesWrap = document.getElementById('salespersonFilter')?.closest('.filter-wrap');
  const typeWrap  = document.getElementById('typeFilter')?.closest('.filter-wrap');
  if (salesWrap) salesWrap.style.display = isLog ? 'none' : '';
  if (typeWrap)  typeWrap.style.display  = isLog ? 'none' : '';

  const anyActive = !!(searchQ || advFilter || (!isLog && salesFilter) || (!isLog && typeFilter));
  const clearAll = document.getElementById('clearAllFilters');
  if (clearAll) clearAll.style.display = anyActive ? 'inline-flex' : 'none';
}

// V2: Contextual insights bar that appears above the table when filters or
// search are active. Summarizes what the filtered set actually contains —
// total count, status breakdown, date range — so the filter is informative,
// not just a narrowing tool.
function renderFilterSummary() {
  const el = document.getElementById('filterSummary');
  if (!el) return;

  const tabMeta = TABS.find(t => t.id === activeTab);
  const isLog = !!tabMeta?.isLog;

  // Determine if any filter is actually active
  const anyActive = !!(searchQ || advFilter || (!isLog && salesFilter) || (!isLog && typeFilter));
  if (!anyActive) {
    el.classList.remove('visible');
    el.innerHTML = '';
    return;
  }

  const rows = DATA[activeTab] || [];
  const filtered = isLog ? filterLogRows(rows) : filterRows(rows);

  // Build a list of active filter chips for context
  const activeBits = [];
  if (searchQ)    activeBits.push(`"${searchQ}"`);
  if (advFilter)  activeBits.push(advFilter);
  if (!isLog && salesFilter) activeBits.push(salesFilter);
  if (!isLog && typeFilter)  activeBits.push(typeFilter);

  const parts = [];
  parts.push(`<span class="fs-label">Filter</span>`);
  parts.push(`<span class="fs-stat"><span class="num">${filtered.length}</span> of ${rows.length} on ${escHTML(tabMeta?.label || '')}</span>`);

  if (!isLog && filtered.length > 0) {
    // Status breakdown — count non-zero statuses only, most common first
    const statusCounts = {};
    filtered.forEach(r => {
      const k = getStatusKey(r);
      statusCounts[k] = (statusCounts[k] || 0) + 1;
    });
    const sorted = Object.entries(statusCounts).sort((a, b) => b[1] - a[1]);
    if (sorted.length > 1) {
      // Only show a breakdown if there's more than one status represented
      parts.push('<span class="fs-divider"></span>');
      sorted.forEach(([key, count]) => {
        parts.push(`<span class="fs-stat"><span class="num">${count}</span> ${statusLabel(key).toLowerCase()}</span>`);
      });
    }

    // Date range — earliest start → latest end
    const dates = filtered
      .map(r => r._startOverride || r.startDate)
      .filter(Boolean)
      .map(d => { const iso = toISODate(d); return iso ? new Date(iso) : null; })
      .filter(d => d && !isNaN(d));
    if (dates.length >= 2) {
      const earliest = new Date(Math.min(...dates));
      const latest   = new Date(Math.max(...dates));
      if (earliest.getTime() !== latest.getTime()) {
        const fmt = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
        parts.push('<span class="fs-divider"></span>');
        parts.push(`<span class="fs-stat">${fmt(earliest)} → ${fmt(latest)}</span>`);
      }
    }
  }

  // Show what filters are active at the end
  if (activeBits.length > 0) {
    parts.push('<span class="fs-divider"></span>');
    parts.push(`<span class="fs-stat" style="color:var(--slate)">Filtering: ${activeBits.map(b => `<span style="color:var(--ink);font-weight:500;margin:0 3px">${escHTML(b)}</span>`).join(' · ')}</span>`);
  }

  el.innerHTML = parts.join('');
  el.classList.add('visible');
}

// ════════════════════════════════════════════════════════════
//  GLOBAL DELEGATION — runs once, survives re-renders
// ════════════════════════════════════════════════════════════
function installGlobalHandlers() {
  // ── STATUS PORTAL ──
  const portal = document.getElementById('status-portal');
  let portalCtx = null; // { idx, tab }

  function showStatusPortal(trigger) {
    portalCtx = { idx: parseInt(trigger.dataset.idx), tab: trigger.dataset.tab };
    const row = DATA[portalCtx.tab][portalCtx.idx];
    const cur = getStatusKey(row);
    portal.querySelectorAll('.portal-option').forEach(o => {
      o.classList.toggle('selected', o.dataset.val === cur);
    });

    // Show first (off-screen) so we can measure actual height
    portal.style.visibility = 'hidden';
    portal.style.display = 'block';
    portal.style.top  = '0px';
    portal.style.left = '0px';

    const rect = trigger.getBoundingClientRect();
    const portalRect = portal.getBoundingClientRect();
    const portalH = portalRect.height;
    const portalW = portalRect.width;
    const margin = 8;
    const vh = window.innerHeight;
    const vw = window.innerWidth;

    // Prefer below; flip above if not enough room
    const spaceBelow = vh - rect.bottom;
    const spaceAbove = rect.top;
    let top;
    if (spaceBelow >= portalH + margin || spaceBelow >= spaceAbove) {
      top = Math.min(rect.bottom + 6, vh - portalH - margin);
    } else {
      top = Math.max(margin, rect.top - portalH - 6);
    }

    // Clamp horizontally so portal stays fully on screen
    let left = rect.left;
    if (left + portalW + margin > vw) left = vw - portalW - margin;
    if (left < margin) left = margin;

    portal.style.top  = top + 'px';
    portal.style.left = left + 'px';
    portal.style.visibility = 'visible';
  }
  function hideStatusPortal() {
    portal.style.display = 'none';
    portal.style.visibility = '';
    portalCtx = null;
  }

  document.addEventListener('click', e => {
    const trigger = e.target.closest('.edit-trigger');
    if (!trigger) return;
    e.stopPropagation();
    if (portal.style.display === 'block') { hideStatusPortal(); return; }
    showStatusPortal(trigger);
  }, true);

  portal.addEventListener('click', async e => {
    e.stopPropagation();
    const opt = e.target.closest('.portal-option');
    if (!opt || !portalCtx) return;
    const newStatus = opt.dataset.val;
    const { idx, tab } = portalCtx;
    hideStatusPortal();

    const row = DATA[tab][idx];
    const oldStatus = getStatusKey(row);
    if (newStatus === oldStatus) return;

    // Set the new status locally
    row.status = statusLabel(newStatus);

    // Determine the destination tab. For most statuses this is the same as the status key,
    // but 'new' and 'upcoming' both live on the 'upcoming' tab.
    const destTab = statusTabFor(newStatus);

    // If destination tab differs from current tab, physically move the row between sheets
    if (destTab !== tab && SHEET_MAP[destTab]) {
      const updatedValues = rowToSheetValues(row);
      updatedValues[COL.status] = statusLabel(newStatus);

      // Optimistic local move
      DATA[tab].splice(idx, 1);
      DATA[tab].forEach((r, i) => { r._idx = i; }); // reindex
      const newRow = { ...row, _idx: DATA[destTab].length, _tab: destTab };
      DATA[destTab].push(newRow);
      renderTabs();
      renderStats();
      renderAll();

      // Persist to sheets
      const ok = await moveRowBetweenSheets(tab, idx, destTab, updatedValues);
      if (!ok) {
        // on error, reload sheets to get ground truth
        loadAllSheets();
      } else {
        // Refresh both affected tabs so _idx values match the sheet exactly.
        try {
          const [freshFrom, freshTo] = await Promise.all([
            fetchSheet(tab),
            fetchSheet(destTab),
          ]);
          DATA[tab] = freshFrom;
          DATA[destTab] = freshTo;
          renderTabs();
          renderStats();
          renderAll();
        } catch(_) { /* auto-sync will eventually reconcile */ }
      }
    } else {
      // Same tab — just update the Status column in place
      writeCell(tab, idx, COL.status, statusLabel(newStatus));
      renderAll();
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.edit-trigger') && !portal.contains(e.target)) hideStatusPortal();
    if (!e.target.closest('.date-picker') && !e.target.closest('td.editable-date'))
      document.querySelectorAll('.date-picker.open').forEach(p => p.classList.remove('open'));
    if (!e.target.closest('.gam-editor') && !e.target.closest('.gam-trigger')) {
      document.querySelectorAll('.gam-editor.open').forEach(ed => {
        ed.classList.remove('open');
        ed.classList.remove('flip-up');
      });
    }
  });

  // ── DATE APPLY (capture phase) ──
  document.addEventListener('click', e => {
    if (!e.target.classList.contains('date-apply')) return;
    e.stopPropagation();
    const picker = e.target.closest('.date-picker');
    const td     = e.target.closest('td.editable-date');
    if (!picker || !td) return;
    const mm = picker.querySelector('.d-mm').value.trim();
    const dd = picker.querySelector('.d-dd').value.trim();
    const yy = picker.querySelector('.d-yyyy').value.trim();
    if (!mm || !dd || yy.length < 4) return;
    const iso = `${yy.padStart(4,'0')}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`;
    const idx = parseInt(td.dataset.idx);
    const tab = td.dataset.tab;
    const field = td.dataset.field;
    const key = field === 'startDate' ? '_startOverride' : '_endOverride';
    DATA[tab][idx][key] = iso;
    DATA[tab][idx][field] = iso;
    const colIdx = field === 'startDate' ? COL.startDate : COL.endDate;
    writeCell(tab, idx, colIdx, `${mm}/${dd}/${yy}`);
    picker.classList.remove('open');
    renderAll();
  }, true);

  // ── DATE CLEAR (capture phase) ──
  document.addEventListener('click', e => {
    if (!e.target.classList.contains('date-clear')) return;
    e.stopPropagation();
    const td = e.target.closest('td.editable-date');
    if (!td) return;
    const idx = parseInt(td.dataset.idx);
    const tab = td.dataset.tab;
    const field = td.dataset.field;
    const key = field === 'startDate' ? '_startOverride' : '_endOverride';
    DATA[tab][idx][key] = '';
    DATA[tab][idx][field] = '';
    const colIdx = field === 'startDate' ? COL.startDate : COL.endDate;
    writeCell(tab, idx, colIdx, '');
    td.querySelector('.date-picker').classList.remove('open');
    renderAll();
  }, true);

  // ── DATE FIELD AUTO-ADVANCE ──
  document.addEventListener('input', e => {
    if (e.target.classList.contains('d-mm') && e.target.value.length >= 2) {
      e.target.closest('.date-fields').querySelector('.d-dd').focus();
    }
    if (e.target.classList.contains('d-dd') && e.target.value.length >= 2) {
      e.target.closest('.date-fields').querySelector('.d-yyyy').focus();
    }
  });
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (!e.target.matches('.d-mm, .d-dd, .d-yyyy')) return;
    e.stopPropagation();
    e.target.closest('.date-picker').querySelector('.date-apply').click();
  });

  // ── GAM LINK: open editor on pencil click ──
  document.addEventListener('click', e => {
    const trigger = e.target.closest('.gam-trigger');
    if (!trigger) return;
    e.stopPropagation();
    const td = trigger.closest('td.gam-link-cell');
    const editor = td.querySelector('.gam-editor');
    if (!editor) return;

    // Close any other open editors/pickers
    document.querySelectorAll('.gam-editor.open').forEach(ed => {
      if (ed !== editor) { ed.classList.remove('open'); ed.classList.remove('flip-up'); }
    });
    document.querySelectorAll('.date-picker.open').forEach(p => p.classList.remove('open'));

    const willOpen = !editor.classList.contains('open');
    editor.classList.toggle('open');
    if (willOpen) {
      // Flip up when near bottom of scroll area
      editor.classList.remove('flip-up');
      const scroller = td.closest('.table-scroll');
      const tdRect = td.getBoundingClientRect();
      const edRect = editor.getBoundingClientRect();
      const bottomBound = scroller ? scroller.getBoundingClientRect().bottom : window.innerHeight;
      const topBound    = scroller ? scroller.getBoundingClientRect().top    : 0;
      const spaceBelow = bottomBound - tdRect.bottom;
      const spaceAbove = tdRect.top - topBound;
      if (spaceBelow < edRect.height + 8 && spaceAbove > spaceBelow) {
        editor.classList.add('flip-up');
      }
      const input = editor.querySelector('.gam-input');
      setTimeout(() => { try { input.select(); } catch(_) {} input?.focus(); }, 40);
    } else {
      editor.classList.remove('flip-up');
    }
  });

  // ── GAM LINK: save button (capture phase to beat bubble) ──
  document.addEventListener('click', e => {
    if (!e.target.classList.contains('gam-save')) return;
    e.stopPropagation();
    const editor = e.target.closest('.gam-editor');
    const td     = e.target.closest('td.gam-link-cell');
    if (!editor || !td) return;
    const input = editor.querySelector('.gam-input');
    const val = input.value.trim();
    const idx = parseInt(td.dataset.idx);
    const tab = td.dataset.tab;
    DATA[tab][idx]._gamLinkOverride = val;
    DATA[tab][idx].gamLink = val;
    writeCell(tab, idx, COL.gamLink, val);
    editor.classList.remove('open');
    editor.classList.remove('flip-up');
    renderAll();
  }, true);

  // ── GAM LINK: clear button (capture phase) ──
  document.addEventListener('click', e => {
    if (!e.target.classList.contains('gam-clear')) return;
    e.stopPropagation();
    const editor = e.target.closest('.gam-editor');
    const td     = e.target.closest('td.gam-link-cell');
    if (!editor || !td) return;
    const idx = parseInt(td.dataset.idx);
    const tab = td.dataset.tab;
    DATA[tab][idx]._gamLinkOverride = '';
    DATA[tab][idx].gamLink = '';
    writeCell(tab, idx, COL.gamLink, '');
    editor.classList.remove('open');
    editor.classList.remove('flip-up');
    renderAll();
  }, true);

  // ── GAM LINK: stop propagation inside editor (so clicks don't close it) ──
  document.addEventListener('click', e => {
    if (e.target.closest('.gam-editor') && !e.target.matches('.gam-save, .gam-clear')) {
      e.stopPropagation();
    }
  });

  // ── GAM LINK: Enter saves, Escape closes ──
  document.addEventListener('keydown', e => {
    if (!e.target.classList.contains('gam-input')) return;
    if (e.key === 'Enter') {
      e.stopPropagation();
      e.target.closest('.gam-editor').querySelector('.gam-save').click();
    } else if (e.key === 'Escape') {
      e.stopPropagation();
      const ed = e.target.closest('.gam-editor');
      ed.classList.remove('open');
      ed.classList.remove('flip-up');
    }
  });

  // ── REPORT REQUEST BUTTON (Delivering + Completed tabs) ──
  document.addEventListener('click', async e => {
    const btn = e.target.closest('.report-btn');
    if (!btn) return;
    e.stopPropagation();
    if (btn.classList.contains('requested') || btn.disabled) return;

    const td  = btn.closest('td.report-btn-cell');
    const idx = parseInt(td.dataset.idx);
    const tab = td.dataset.tab;
    const r   = DATA[tab][idx];
    if (!r) return;

    // Optimistic UI state: disable, show sending
    btn.classList.add('sending');
    btn.disabled = true;
    btn.textContent = '… Sending';

    const ok = await sendReportRequest(r);

    // Note: with 'no-cors' mode, a fetch error only fires on total network
    // failure; we otherwise treat it as successful since Slack accepts the POST.
    btn.classList.remove('sending');
    if (ok) {
      _reportRequested.add(reportKey(r));
      btn.classList.add('requested');
      btn.textContent = '✓ Requested';
      btn.title = 'Report already requested this session';
      // Keep disabled — the requested state is final until page reload
    } else {
      // Let the user try again
      btn.disabled = false;
      btn.textContent = '📊 Request Report';
      btn.title = 'Send failed — click to retry';
    }
  });
}

// ════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════════
//  V2: KEYBOARD SHORTCUTS
// ════════════════════════════════════════════════════════════
// Provides app-wide keyboard navigation so Christine can fly through the UI
// without touching the mouse. Shortcuts are disabled while typing in inputs
// (except for a few global ones like Cmd/Ctrl+K and Esc).
function installKeyboardShortcuts() {
  document.addEventListener('keydown', (e) => {
    // Always-active shortcuts (work even inside inputs)
    // Cmd/Ctrl+K → open command palette
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      openCommandPalette();
      return;
    }
    // Esc → context-aware close: palette > editors > filters
    if (e.key === 'Escape') {
      if (document.getElementById('cmdPalette')?.classList.contains('open')) {
        closeCommandPalette();
        return;
      }
      if (document.getElementById('shortcutsHelp')?.classList.contains('open')) {
        document.getElementById('shortcutsHelp').classList.remove('open');
        return;
      }
      // Close any open editors
      const anyOpen = document.querySelector('.date-picker.open, .gam-editor.open');
      if (anyOpen) {
        document.querySelectorAll('.date-picker.open, .gam-editor.open').forEach(el => {
          el.classList.remove('open');
          el.classList.remove('flip-up');
        });
        document.getElementById('status-portal').style.display = 'none';
        return;
      }
      // Only clear filters if focused on the body (not inside an input)
      if (document.activeElement === document.body || document.activeElement?.tagName === 'TABLE') {
        if (searchQ || advFilter || salesFilter || typeFilter) {
          document.getElementById('clearAllFilters')?.click();
        }
      }
      return;
    }

    // Skip all other shortcuts if typing in an input/textarea/select
    const t = e.target;
    const isInput = t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT' || t.isContentEditable;
    if (isInput) return;

    // Single-key shortcuts (only when not typing)
    switch (e.key) {
      case '/':
        e.preventDefault();
        document.getElementById('searchInput')?.focus();
        break;
      case '?':
        e.preventDefault();
        toggleShortcutsHelp();
        break;
      case '1': case '2': case '3': case '4': case '5': case '6': case '7': {
        const tabIdx = parseInt(e.key) - 1;
        const tabId = TABS[tabIdx]?.id;
        if (tabId && tabId !== activeTab) {
          e.preventDefault();
          activeTab = tabId;
          userSortedThisTab = false;
          applyDefaultSort(activeTab);
          syncFloatButtons();
          syncFilterUI();
          renderTabs();
          renderAll();
        }
        break;
      }
    }
  });
}

// Shortcuts help overlay
function toggleShortcutsHelp() {
  let overlay = document.getElementById('shortcutsHelp');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'shortcutsHelp';
    overlay.className = 'shortcuts-help';
    overlay.innerHTML = `
      <div class="shortcuts-panel">
        <div class="shortcuts-header">
          <h2>Keyboard shortcuts</h2>
          <button class="shortcuts-close" aria-label="Close">×</button>
        </div>
        <div class="shortcuts-grid">
          <div class="shortcuts-section">
            <h3>Navigation</h3>
            <div class="shortcut-row"><kbd>1</kbd>–<kbd>7</kbd><span>Jump to tab</span></div>
            <div class="shortcut-row"><kbd>/</kbd><span>Focus search</span></div>
            <div class="shortcut-row"><kbd>⌘ K</kbd><span>Command palette</span></div>
            <div class="shortcut-row"><kbd>Esc</kbd><span>Close / clear</span></div>
          </div>
          <div class="shortcuts-section">
            <h3>Quick filters (in palette)</h3>
            <div class="shortcut-row"><kbd>new:</kbd><span>Show new items</span></div>
            <div class="shortcut-row"><kbd>overdue:</kbd><span>Show overdue items</span></div>
            <div class="shortcut-row"><kbd>soon:</kbd><span>Items starting in 7 days</span></div>
            <div class="shortcut-row"><kbd>advertiser:</kbd><span>Filter by advertiser</span></div>
          </div>
          <div class="shortcuts-section">
            <h3>Help</h3>
            <div class="shortcut-row"><kbd>?</kbd><span>Toggle this panel</span></div>
          </div>
        </div>
        <div class="shortcuts-footer">Press <kbd>?</kbd> again or <kbd>Esc</kbd> to close</div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay || e.target.classList.contains('shortcuts-close')) {
        overlay.classList.remove('open');
      }
    });
  }
  overlay.classList.toggle('open');
}

// ════════════════════════════════════════════════════════════
//  V2: COMMAND PALETTE
// ════════════════════════════════════════════════════════════
// Cmd/Ctrl+K opens a fuzzy-match jump-to-row launcher. Supports plain text
// search (matches advertiser/IO/line-item/deal-id) and special prefixes:
//   new:      → quick filter to new rows
//   overdue:  → quick filter to overdue rows
//   soon:     → quick filter to items starting within 7 days
//   advertiser:X → jump-filter to that advertiser
function openCommandPalette() {
  let palette = document.getElementById('cmdPalette');
  if (!palette) {
    palette = document.createElement('div');
    palette.id = 'cmdPalette';
    palette.className = 'cmd-palette';
    palette.innerHTML = `
      <div class="cmd-panel">
        <div class="cmd-input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" class="cmd-input" id="cmdInput" placeholder="Jump to anything — try 'new:', 'overdue:', or an advertiser name">
          <kbd class="cmd-hint">esc</kbd>
        </div>
        <div class="cmd-results" id="cmdResults"></div>
        <div class="cmd-footer">
          <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
          <span><kbd>↵</kbd> select</span>
          <span><kbd>esc</kbd> close</span>
        </div>
      </div>`;
    document.body.appendChild(palette);
    palette.addEventListener('click', (e) => {
      if (e.target === palette) closeCommandPalette();
    });
    const input = palette.querySelector('#cmdInput');
    input.addEventListener('input', renderCommandResults);
    input.addEventListener('keydown', handleCommandKey);
  }
  palette.classList.add('open');
  const input = palette.querySelector('#cmdInput');
  input.value = '';
  _cmdSelected = 0;
  renderCommandResults();
  setTimeout(() => input.focus(), 30);
}

function closeCommandPalette() {
  document.getElementById('cmdPalette')?.classList.remove('open');
}

let _cmdSelected = 0;
let _cmdMatches = [];

function renderCommandResults() {
  const q = document.getElementById('cmdInput').value.trim();
  const resultsEl = document.getElementById('cmdResults');
  if (!resultsEl) return;

  // Quick-filter prefixes
  const quickFilters = [
    { prefix: 'new:',       label: 'Show new items',         tab: 'upcoming', action: () => jumpTo('upcoming', { floatKey: 'new' }) },
    { prefix: 'overdue:',   label: 'Show overdue items',     tab: 'upcoming', action: () => jumpTo('upcoming', { floatKey: 'overdue' }) },
    { prefix: 'soon:',      label: 'Items starting in 7 days', tab: 'upcoming', action: () => jumpTo('upcoming', { floatKey: 'soon' }) },
    { prefix: 'delivering:', label: 'Go to Delivering tab',   tab: 'delivering', action: () => jumpTo('delivering') },
    { prefix: 'ready:',     label: 'Go to Ready tab',        tab: 'ready',    action: () => jumpTo('ready') },
    { prefix: 'paused:',    label: 'Go to Paused tab',       tab: 'paused',   action: () => jumpTo('paused') },
    { prefix: 'completed:', label: 'Go to Completed tab',    tab: 'completed', action: () => jumpTo('completed') },
    { prefix: 'cancelled:', label: 'Go to Cancelled tab',    tab: 'cancelled', action: () => jumpTo('cancelled') },
    { prefix: 'log:',       label: 'Go to Change Log',       tab: 'changelog', action: () => jumpTo('changelog') },
  ];

  let matches = [];

  // Empty query → show tab navigation options
  if (!q) {
    matches = TABS.map(t => ({
      type: 'tab',
      title: `Go to ${t.label}`,
      subtitle: `${(DATA[t.id] || []).length} items`,
      action: () => jumpTo(t.id),
    }));
  } else {
    const qLow = q.toLowerCase();
    // Check quick-filter prefixes
    const qf = quickFilters.find(f => f.prefix.startsWith(qLow) || qLow.startsWith(f.prefix));
    if (qf) {
      matches.push({ type: 'filter', title: qf.label, subtitle: `on ${qf.tab} tab`, action: qf.action });
    }

    // Advertiser prefix matching
    const advMatch = qLow.match(/^advertiser:\s*(.*)$/);
    if (advMatch) {
      const needle = advMatch[1].toLowerCase();
      const allAdvs = [...new Set(Object.values(DATA).flat().map(r => r.advertiser).filter(Boolean))];
      allAdvs
        .filter(a => a.toLowerCase().includes(needle))
        .slice(0, 8)
        .forEach(a => matches.push({
          type: 'advertiser',
          title: a,
          subtitle: `Filter by advertiser`,
          action: () => { advFilter = a; document.getElementById('advertiserFilter').value = a; syncFilterUI(); renderAll(); closeCommandPalette(); },
        }));
    }

    // Free-text row matching across all tabs
    const allRows = [];
    TABS.forEach(t => {
      if (t.isLog) return;
      (DATA[t.id] || []).forEach(r => allRows.push({ r, tab: t.id, tabLabel: t.label }));
    });
    const rowMatches = allRows
      .filter(({ r }) => {
        const hay = [r.advertiser, r.ioName, r.lineItem, r.dealId, r.lineItemId].join(' ').toLowerCase();
        return hay.includes(qLow);
      })
      .slice(0, 12);
    rowMatches.forEach(({ r, tab, tabLabel }) => {
      matches.push({
        type: 'row',
        title: `${r.advertiser || '—'} · ${r.lineItem || r.ioName || '—'}`,
        subtitle: `${tabLabel} · Deal ${r.dealId || '—'}`,
        action: () => {
          searchQ = q; // set search to this query so it's visible on arrival
          document.getElementById('searchInput').value = q;
          jumpTo(tab);
        },
      });
    });
  }

  _cmdMatches = matches;
  if (_cmdSelected >= matches.length) _cmdSelected = Math.max(0, matches.length - 1);

  resultsEl.innerHTML = matches.length === 0
    ? `<div class="cmd-empty">No matches.</div>`
    : matches.map((m, i) => `
      <div class="cmd-result${i === _cmdSelected ? ' selected' : ''}" data-idx="${i}">
        <div class="cmd-result-main">
          <span class="cmd-result-title">${escHTML(m.title)}</span>
          <span class="cmd-result-sub">${escHTML(m.subtitle)}</span>
        </div>
        <span class="cmd-result-type">${m.type}</span>
      </div>`).join('');

  resultsEl.querySelectorAll('.cmd-result').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      _cmdMatches[idx]?.action();
    });
    el.addEventListener('mouseenter', () => {
      _cmdSelected = parseInt(el.dataset.idx);
      resultsEl.querySelectorAll('.cmd-result').forEach((r, i) => r.classList.toggle('selected', i === _cmdSelected));
    });
  });
}

function handleCommandKey(e) {
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    _cmdSelected = Math.min(_cmdSelected + 1, _cmdMatches.length - 1);
    renderCommandResults();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    _cmdSelected = Math.max(_cmdSelected - 1, 0);
    renderCommandResults();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    _cmdMatches[_cmdSelected]?.action();
  }
}

function jumpTo(tabId, opts = {}) {
  if (tabId && tabId !== activeTab) {
    activeTab = tabId;
    userSortedThisTab = false;
    applyDefaultSort(activeTab);
  }
  if (opts.floatKey === 'new')      floatNew = true;
  if (opts.floatKey === 'overdue')  floatOverdue = true;
  if (opts.floatKey === 'soon')     floatSoon = true;
  syncFloatButtons();
  syncFilterUI();
  renderTabs();
  renderAll();
  closeCommandPalette();
}

document.addEventListener('DOMContentLoaded', () => {
  applyDefaultSort(activeTab);  // set initial sort based on default tab (Upcoming)
  renderTabs();
  renderStats();
  installGlobalHandlers();
  installKeyboardShortcuts();

  // Search
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQ = e.target.value; syncFilterUI(); renderAll();
  });
  document.getElementById('advertiserFilter').addEventListener('change', e => {
    advFilter = e.target.value; syncFilterUI(); renderAll();
  });
  document.getElementById('salespersonFilter').addEventListener('change', e => {
    salesFilter = e.target.value; syncFilterUI(); renderAll();
  });
  document.getElementById('typeFilter').addEventListener('change', e => {
    typeFilter = e.target.value; syncFilterUI(); renderAll();
  });

  // Per-filter × clear buttons
  document.querySelectorAll('.filter-clear').forEach(btn => {
    btn.addEventListener('click', () => {
      const targetId = btn.dataset.target;
      const sel = document.getElementById(targetId);
      if (!sel) return;
      sel.value = '';
      // Mirror change into state variables
      if (targetId === 'advertiserFilter')  advFilter   = '';
      if (targetId === 'salespersonFilter') salesFilter = '';
      if (targetId === 'typeFilter')        typeFilter  = '';
      syncFilterUI();
      renderAll();
    });
  });

  // Global "Clear all" — resets search + all three filters at once
  document.getElementById('clearAllFilters').addEventListener('click', () => {
    searchQ = '';
    advFilter = '';
    salesFilter = '';
    typeFilter = '';
    document.getElementById('searchInput').value = '';
    document.getElementById('advertiserFilter').value = '';
    document.getElementById('salespersonFilter').value = '';
    document.getElementById('typeFilter').value = '';
    syncFilterUI();
    renderAll();
  });

  syncFilterUI();

  // Float-to-top toggles
  document.getElementById('btnFloatMentions').addEventListener('click', () => {
    floatMentions = !floatMentions;
    syncFloatButtons();
    renderAll();
  });
  document.getElementById('btnFloatNew').addEventListener('click', () => {
    floatNew = !floatNew;
    syncFloatButtons();
    renderAll();
  });
  document.getElementById('btnFloatOverdue').addEventListener('click', () => {
    floatOverdue = !floatOverdue;
    syncFloatButtons();
    renderAll();
  });
  document.getElementById('btnFloatSoon').addEventListener('click', () => {
    floatSoon = !floatSoon;
    syncFloatButtons();
    renderAll();
  });
  syncFloatButtons();

  // Auth buttons
  document.getElementById('btnSignin').addEventListener('click', signIn);
  document.getElementById('btnSigninFF').addEventListener('click', signInFirefox);
  document.getElementById('btnSignout').addEventListener('click', signOut);
  document.getElementById('btnReload').addEventListener('click', loadAllSheets);

  // Firefox detection
  const isFF = navigator.userAgent.toLowerCase().includes('firefox');
  if (isFF) {
    document.getElementById('btnSigninFF').style.display = '';
    document.getElementById('btnSignin').style.display = 'none';
  }

  // Check for Firefox OAuth redirect
  if (checkOAuthRedirect()) return;

  // Init — but do NOT load data until signed in
  initGoogleAuth();
  showSignInPrompt();
});
</script>
