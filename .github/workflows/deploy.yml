name: Deploy

on:
  # Automatic deploys are disabled by default in this template.
  # When you are ready to enable production deploys, change this to:
  #   push:
  #     branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false   # Never cancel an in-flight production deploy.

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for OIDC authentication to AWS.
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to production
        run: npx sst deploy --stage production
        env:
          # Add any additional secrets your SST config needs here.
          NODE_ENV: production
